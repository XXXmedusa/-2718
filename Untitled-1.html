<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Теплая петля</title>
  <style>
    :root {
      --bg: #f8efe7;
      --bg-2: #f3dfd2;
      --panel: rgba(255, 250, 245, 0.82);
      --line: rgba(99, 74, 59, 0.14);
      --text: #4a352d;
      --muted: #826a60;
      --accent: #c9705a;
      --accent-2: #e0a590;
      --gold: #efc989;
      --sky: #dfeaf4;
      --mint: #d8e7dc;
      --shadow: 0 24px 60px rgba(111, 79, 67, 0.14);
      --radius: 28px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(239, 201, 137, 0.28), transparent 25%),
        radial-gradient(circle at top right, rgba(223, 234, 244, 0.8), transparent 26%),
        linear-gradient(180deg, #fbf5f0 0%, #f8ede4 50%, #f3e2d6 100%);
    }

    button {
      font: inherit;
      color: inherit;
      border: 0;
      cursor: pointer;
    }

    #app {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .layout {
      width: min(1250px, 100%);
      display: grid;
      grid-template-columns: 390px minmax(0, 1fr);
      gap: 24px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .sidebar {
      padding: 28px;
      display: grid;
      gap: 18px;
      align-self: start;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.75rem;
    }

    h1 {
      margin: 0;
      font-family: "Georgia", "Palatino Linotype", serif;
      font-size: clamp(2.4rem, 5vw, 3.6rem);
      line-height: 0.92;
    }

    .lead,
    .message p,
    .hint {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .project-switch {
      display: grid;
      gap: 10px;
    }

    .project-pill {
      width: 100%;
      padding: 14px 16px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid transparent;
      text-align: left;
      transition: 0.2s ease;
    }

    .project-pill.is-active {
      background: linear-gradient(135deg, rgba(224, 165, 144, 0.24), rgba(255, 255, 255, 0.8));
      border-color: rgba(201, 112, 90, 0.24);
      transform: translateY(-1px);
    }

    .pill-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-weight: 700;
    }

    .pill-bar {
      margin-top: 10px;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid var(--line);
    }

    .pill-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--gold));
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      padding: 16px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid var(--line);
    }

    .stat-label {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .stat-value {
      margin-top: 8px;
      font-size: 1.55rem;
      font-weight: 800;
    }

    .message {
      padding: 18px;
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(255, 246, 239, 0.95), rgba(240, 223, 210, 0.7));
      border: 1px solid rgba(201, 112, 90, 0.16);
    }

    .message strong {
      display: block;
      margin-bottom: 8px;
      font-size: 1.02rem;
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    .primary,
    .secondary {
      min-height: 52px;
      padding: 14px 18px;
      border-radius: 999px;
      font-weight: 700;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .primary {
      background: linear-gradient(135deg, #d67a63, #edb09f);
      color: white;
    }

    .secondary {
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid var(--line);
    }

    .primary:hover,
    .secondary:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(118, 83, 68, 0.12);
    }

    .scene {
      position: relative;
      overflow: hidden;
      min-height: 720px;
      background:
        radial-gradient(circle at 15% 10%, rgba(255, 255, 255, 0.82), transparent 18%),
        linear-gradient(180deg, #f6ede5 0%, #efe1d4 52%, #e7d3c5 100%);
    }

    .window {
      position: absolute;
      top: 42px;
      right: 48px;
      width: 220px;
      height: 250px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(215, 234, 249, 0.96), rgba(250, 246, 239, 0.8)),
        white;
      border: 10px solid rgba(255, 250, 245, 0.92);
      box-shadow: inset 0 0 0 1px rgba(125, 102, 90, 0.08);
    }

    .window::before,
    .window::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.9);
    }

    .window::before {
      inset: 0;
      width: 10px;
      margin: 0 auto;
    }

    .window::after {
      left: 0;
      right: 0;
      top: 50%;
      height: 10px;
      transform: translateY(-50%);
    }

    .floor {
      position: absolute;
      inset: auto 0 0;
      height: 190px;
      background:
        linear-gradient(180deg, rgba(164, 126, 105, 0), rgba(164, 126, 105, 0.08)),
        linear-gradient(90deg, #d6b8a5 0, #d6b8a5 12%, #dabaa8 12%, #dabaa8 24%, #dfbfad 24%, #dfbfad 36%, #d9b9a6 36%, #d9b9a6 48%, #debfae 48%, #debfae 60%, #d8b8a5 60%, #d8b8a5 72%, #debead 72%, #debead 84%, #d7b5a1 84%, #d7b5a1 100%);
      border-top: 1px solid rgba(125, 102, 90, 0.1);
    }

    .chair {
      position: absolute;
      left: 85px;
      bottom: 120px;
      width: 280px;
      height: 260px;
      border-radius: 80px 80px 44px 44px;
      background: linear-gradient(180deg, #d87063, #c75f54);
      box-shadow: inset 0 -18px 0 rgba(120, 43, 31, 0.08);
    }

    .chair::before {
      content: "";
      position: absolute;
      left: 34px;
      right: 34px;
      bottom: 28px;
      height: 86px;
      border-radius: 34px;
      background: rgba(255, 226, 208, 0.26);
    }

    .basket {
      position: absolute;
      right: 88px;
      bottom: 95px;
      width: 140px;
      height: 110px;
      border-radius: 38px 38px 42px 42px;
      background: linear-gradient(180deg, #c99a6e, #ae7f56);
      border: 1px solid rgba(102, 69, 45, 0.12);
      box-shadow: inset 0 10px 0 rgba(255, 255, 255, 0.08);
    }

    .basket::before {
      content: "";
      position: absolute;
      left: 22px;
      right: 22px;
      top: -18px;
      height: 32px;
      border: 8px solid #b78658;
      border-bottom: 0;
      border-radius: 20px 20px 0 0;
    }

    .ball {
      position: absolute;
      border-radius: 50%;
      box-shadow: inset 0 -6px rgba(255,255,255,0.18);
    }

    .ball.one { width: 48px; height: 48px; left: 12px; top: -14px; background: #efb08d; }
    .ball.two { width: 42px; height: 42px; left: 48px; top: -20px; background: #8eb5d0; }
    .ball.three { width: 46px; height: 46px; right: 12px; top: -12px; background: #9dc3a3; }

    .girl {
      position: absolute;
      left: 110px;
      bottom: 128px;
      width: 220px;
      height: 350px;
    }

    .hair,
    .head,
    .body,
    .skirt,
    .arm,
    .leg {
      position: absolute;
    }

    .hair {
      left: 72px;
      top: 28px;
      width: 92px;
      height: 96px;
      border-radius: 48% 48% 40% 40%;
      background: #55342f;
      z-index: 3;
    }

    .head {
      left: 80px;
      top: 42px;
      width: 76px;
      height: 84px;
      border-radius: 44px;
      background: #f4c9b8;
      z-index: 4;
      box-shadow: inset 0 -6px rgba(213, 157, 138, 0.25);
    }

    .head::before,
    .head::after {
      content: "";
      position: absolute;
      top: 44px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #4d352c;
    }

    .head::before { left: 18px; }
    .head::after { right: 18px; }

    .body {
      left: 58px;
      top: 114px;
      width: 122px;
      height: 88px;
      border-radius: 30px;
      background: linear-gradient(180deg, #f4d29c, #ebc17d);
      z-index: 2;
    }

    .skirt {
      left: 45px;
      top: 190px;
      width: 150px;
      height: 88px;
      border-radius: 26px 26px 38px 38px;
      background: linear-gradient(180deg, #7aa2bb, #5e879f);
      z-index: 2;
    }

    .arm {
      top: 138px;
      width: 70px;
      height: 18px;
      border-radius: 999px;
      background: #f1c1ae;
      transform-origin: 10px 9px;
      z-index: 5;
      transition: transform 0.14s ease;
    }

    .arm.left {
      left: 34px;
      transform: rotate(28deg);
    }

    .arm.right {
      left: 116px;
      transform: rotate(-16deg);
    }

    .girl.is-knitting .arm.left { transform: rotate(14deg); }
    .girl.is-knitting .arm.right { transform: rotate(-42deg); }

    .leg {
      top: 262px;
      width: 24px;
      height: 86px;
      border-radius: 999px;
      background: #3e5b74;
      z-index: 1;
    }

    .leg.left { left: 86px; transform: rotate(8deg); }
    .leg.right { left: 126px; transform: rotate(-6deg); }

    .needles {
      position: absolute;
      left: 258px;
      bottom: 324px;
      width: 88px;
      height: 4px;
      background: #c89064;
      transform: rotate(-12deg);
      border-radius: 999px;
      box-shadow: 0 8px 0 #c89064;
    }

    .yarn-line {
      position: absolute;
      left: 296px;
      bottom: 316px;
      width: 210px;
      height: 3px;
      background: linear-gradient(90deg, #d98973, #efc989 70%, rgba(239, 201, 137, 0));
      transform: rotate(-4deg);
      border-radius: 999px;
      opacity: 0.82;
    }

    .project-art {
      position: absolute;
      right: 140px;
      bottom: 240px;
      min-width: 220px;
      min-height: 160px;
      display: grid;
      place-items: center;
    }

    .scarf {
      width: min(360px, 42vw);
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      gap: 6px 0;
      transform: rotate(-12deg);
    }

    .seg {
      width: 32px;
      height: 18px;
      margin-right: -7px;
      border-radius: 999px;
      display: block;
      box-shadow: inset 0 -3px rgba(255, 255, 255, 0.28);
    }

    .c0 { background: #d97e66; }
    .c1 { background: #efc37b; }
    .c2 { background: #85aeca; }
    .c3 { background: #a8c6a2; }

    .fringe {
      width: 24px;
      height: 28px;
      margin-left: 6px;
      background:
        linear-gradient(180deg, transparent 0 6px, #d97e66 6px 100%),
        repeating-linear-gradient(90deg, transparent 0 4px, rgba(255,255,255,0.65) 4px 5px);
      border-radius: 0 0 12px 12px;
      transform: translateY(6px);
    }

    .hat {
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
      gap: 4px;
      transform: translateY(18px);
    }

    .hat-row {
      height: 16px;
      border-radius: 999px;
      box-shadow: inset 0 -3px rgba(255,255,255,0.22);
    }

    .hat .c0 { background: #d97e66; }
    .hat .c1 { background: #efc37b; }
    .hat .c2 { background: #85aeca; }
    .hat .c3 { background: #a8c6a2; }

    .pompom {
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff6ee, #d97e66 72%);
      box-shadow: 0 8px 20px rgba(174, 96, 79, 0.18);
      margin-bottom: 4px;
    }

    .caption {
      position: absolute;
      left: 34px;
      right: 34px;
      bottom: 28px;
      padding: 18px 20px;
      border-radius: 22px;
      background: rgba(255, 250, 245, 0.8);
      border: 1px solid var(--line);
      display: grid;
      gap: 4px;
    }

    .caption strong {
      font-size: 1rem;
    }

    .caption span {
      color: var(--muted);
      line-height: 1.55;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .scene {
        min-height: 640px;
      }
    }

    @media (max-width: 720px) {
      #app { padding: 16px; }
      .sidebar { padding: 22px; }
      .scene { min-height: 560px; }

      .window {
        width: 150px;
        height: 180px;
        right: 20px;
        top: 20px;
      }

      .chair {
        left: 20px;
        width: 220px;
        height: 220px;
      }

      .girl {
        left: 20px;
        transform: scale(0.88);
        transform-origin: bottom left;
      }

      .needles { left: 170px; bottom: 300px; }
      .yarn-line { left: 208px; bottom: 293px; width: 130px; }
      .project-art { right: 16px; bottom: 220px; min-width: 160px; }
      .basket { right: 18px; width: 118px; height: 94px; }
      .stats { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const app = document.getElementById("app");

    const projects = {
      scarf: { title: "Шарф", goal: 28, unit: "рядов" },
      hat: { title: "Шапка", goal: 20, unit: "петель" }
    };

    const state = {
      current: "scarf",
      progress: { scarf: 0, hat: 0 },
      total: 0,
      completed: [],
      knitting: false
    };

    function percent(id) {
      return Math.min(100, Math.round((state.progress[id] / projects[id].goal) * 100));
    }

    function describe(id, value) {
      if (id === "scarf") {
        if (value === 0) return "На спицах пока только первая задумка и мягкий клубок.";
        if (value < 6) return "Шарф только появился, но уже обещает быть уютным.";
        if (value < 14) return "Полоски стали длиннее и уже свешиваются с колен.";
        if (value < 28) return "Шарф растет заметно: им почти можно укутаться.";
        return "Шарф уже огромный. Можно продолжать и делать его совсем королевским.";
      }

      if (value === 0) return "Шапка только начинается: девушка делает первые петли.";
      if (value < 5) return "Появился аккуратный теплый ободок.";
      if (value < 11) return "Шапка уверенно растет вверх и становится пышнее.";
      if (value < 20) return "До готовой шапки совсем немного, макушка уже почти собрана.";
      return "Шапка готова, а помпон становится все солиднее с каждой новой петлей.";
    }

    function makeScarf(value) {
      const count = Math.max(4, value + 4);
      return `
        <div class="scarf">
          ${Array.from({ length: count }, (_, i) => `<span class="seg c${i % 4}"></span>`).join("")}
          <span class="fringe"></span>
        </div>
      `;
    }

    function makeHat(value) {
      const rows = Math.max(4, value + 4);
      const pompom = 14 + Math.min(value, 20) * 1.1;

      return `
        <div class="hat">
          ${Array.from({ length: rows }, (_, i) => {
            const ratio = rows === 1 ? 0 : i / (rows - 1);
            const width = 62 + Math.sin((1 - ratio) * Math.PI) * 42 + Math.min(value, 14) * 1.7;
            return `<span class="hat-row c${i % 4}" style="width:${Math.min(148, width).toFixed(0)}px"></span>`;
          }).join("")}
          <span class="pompom" style="width:${pompom}px;height:${pompom}px"></span>
        </div>
      `;
    }

    function switchProject(projectId) {
      state.current = projectId;
      render();
    }

    function knit() {
      const id = state.current;
      state.progress[id] += 1;
      state.total += 1;

      if (state.progress[id] >= projects[id].goal && !state.completed.includes(id)) {
        state.completed.push(id);
      }

      state.knitting = true;
      render();

      clearTimeout(knit.timer);
      knit.timer = setTimeout(() => {
        state.knitting = false;
        render();
      }, 150);
    }

    function resetCurrent() {
      const id = state.current;
      state.progress[id] = 0;
      state.completed = state.completed.filter((item) => item !== id);
      render();
    }

    function cycleProject() {
      switchProject(state.current === "scarf" ? "hat" : "scarf");
    }

    function render() {
      const current = projects[state.current];
      const currentValue = state.progress[state.current];
      const completedCount = state.completed.length;

      app.innerHTML = `
        <div class="layout">
          <section class="panel sidebar">
            <span class="eyebrow">Мини-игра на пробел</span>
            <h1>Теплая петля</h1>
            <p class="lead">
              Нажимай <strong>пробел</strong>, и девушка будет вязать. Можно переключаться между
              шарфом и шапкой, а изделие становится все больше с каждой новой петлей.
            </p>

            <div class="project-switch">
              ${Object.entries(projects).map(([id, project]) => `
                <button class="project-pill ${state.current === id ? "is-active" : ""}" data-action="switch" data-project="${id}">
                  <div class="pill-top">
                    <span>${project.title}</span>
                    <span>${state.progress[id]} / ${project.goal}</span>
                  </div>
                  <div class="pill-bar">
                    <div class="pill-fill" style="width:${percent(id)}%"></div>
                  </div>
                </button>
              `).join("")}
            </div>

            <div class="stats">
              <div class="stat">
                <div class="stat-label">Сейчас в работе</div>
                <div class="stat-value">${current.title}</div>
              </div>
              <div class="stat">
                <div class="stat-label">Всего нажатий</div>
                <div class="stat-value">${state.total}</div>
              </div>
              <div class="stat">
                <div class="stat-label">Прогресс</div>
                <div class="stat-value">${currentValue}</div>
              </div>
              <div class="stat">
                <div class="stat-label">Готово изделий</div>
                <div class="stat-value">${completedCount}</div>
              </div>
            </div>

            <div class="message" aria-live="polite">
              <strong>${current.title}: ${currentValue} ${current.unit}</strong>
              <p>${describe(state.current, currentValue)}</p>
            </div>

            <div class="controls">
              <button class="primary" data-action="knit">Связать еще петлю</button>
              <button class="secondary" data-action="cycle">Сменить изделие</button>
              <button class="secondary" data-action="reset">Сбросить текущее</button>
            </div>

            <p class="hint">Пробел = 1 петля. На телефоне и мышкой работает большая кнопка.</p>
          </section>

          <section class="panel scene">
            <div class="window"></div>
            <div class="chair"></div>

            <div class="girl ${state.knitting ? "is-knitting" : ""}">
              <div class="hair"></div>
              <div class="head"></div>
              <div class="body"></div>
              <div class="arm left"></div>
              <div class="arm right"></div>
              <div class="skirt"></div>
              <div class="leg left"></div>
              <div class="leg right"></div>
            </div>

            <div class="needles"></div>
            <div class="yarn-line"></div>

            <div class="project-art">
              ${state.current === "scarf" ? makeScarf(currentValue) : makeHat(currentValue)}
            </div>

            <div class="basket">
              <span class="ball one"></span>
              <span class="ball two"></span>
              <span class="ball three"></span>
            </div>

            <div class="floor"></div>

            <div class="caption">
              <strong>Девушка вяжет ${current.title.toLowerCase()}</strong>
              <span>${describe(state.current, currentValue)}</span>
            </div>
          </section>
        </div>
      `;
    }

    app.addEventListener("click", (event) => {
      const button = event.target.closest("[data-action]");
      if (!button) return;

      const action = button.dataset.action;

      if (action === "knit") knit();
      if (action === "reset") resetCurrent();
      if (action === "cycle") cycleProject();
      if (action === "switch") switchProject(button.dataset.project);
    });

    document.addEventListener("keydown", (event) => {
      if (event.code === "Space" && !event.repeat) {
        event.preventDefault();
        knit();
      }
    });

    render();
  </script>
</body>
</html>
